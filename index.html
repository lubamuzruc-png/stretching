<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эстетика Растяжки</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0f; --card: #1a1a1f; --accent: #c8a97e; --text: #e8e4dc; }
        body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; padding: 30px 0; }
        h1 { font-family: 'Cormorant Garamond', serif; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        
        .exercise-card { 
            background: var(--card); 
            border: 1px solid rgba(200,169,126,0.15); 
            border-radius: 12px; 
            margin-bottom: 15px; 
            overflow: hidden; 
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .header-row { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--accent); }
        
        .content-box { 
            display: none; 
            padding: 0 20px 20px; 
        }
        
        /* Когда карточка активна — показываем контент */
        .exercise-card.active .content-box { display: block; }
        
        video { width: 100%; border-radius: 8px; background: #000; display: block; }
        .info { font-size: 0.95rem; margin-top: 15px; opacity: 0.8; line-height: 1.5; border-left: 1px solid var(--accent); padding-left: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Эстетика Растяжки</h1></header>
    <div id="list"></div>
</div>

<script>
const exercises = [
    { id: 1, name: "Бабочка", info: "Выполнять по 1 мин. Можно помогать руками." },
    { id: 2, name: "Бабочка с наклоном", info: "Выполнять 1-2 мин. Расслабьте бедра." },
    { id: 3, name: "Два наклона вперед", info: "Третий наклон с удержанием 10 сек." },
    { id: 4, name: "Ноги врозь", info: "Боковые наклоны к ноге с удержанием." },
    { id: 5, name: "Прогиб в спине", info: "Наклон назад, держать по 1 мин." },
    { id: 6, name: "Выпады", info: "На правую и левую ногу по 1 мин." },
    { id: 7, name: "Выпад со сгибом", info: "Растяжка со сгибом в задней ноге." },
    { id: 8, name: "Скрещивание рук", info: "С вытягиванием ног вперед." },
    { id: 9, name: "Обхват ноги", info: "С внутренней стороны с обхватом пятки." },
    { id: 10, name: "Корзинка", info: "С удержанием 5 секунд. 5 повторов." },
    { id: 11, name: "Прогиб с колен", info: "Удерживая руками голень." },
    { id: 12, name: "Шпагат", info: "Выполнять поэтапно и осторожно." },
    { id: 13, name: "Махи ногами", info: "Поочередно с удержанием по 3 сек." }
];

let activeId = null;

function render() {
    const listContainer = document.getElementById('list');
    listContainer.innerHTML = exercises.map(ex => `
        <div class="exercise-card ${activeId === ex.id ? 'active' : ''}" onclick="toggleCard(${ex.id})">
            <div class="header-row">
                <div class="title">${ex.id}. ${ex.name}</div>
                <div style="color:var(--accent)">${activeId === ex.id ? '−' : '+'}</div>
            </div>
            <div class="content-box">
                <video id="v-${ex.id}" controls playsinline muted loop>
                    <source src="v${ex.id}.mp4" type="video/mp4">
                </video>
                <div class="info"><b>Техника:</b> ${ex.info}</div>
            </div>
        </div>
    `).join('');
}

function toggleCard(id) {
    if (activeId === id) {
        activeId = null;
    } else {
        activeId = id;
    }
    render();
    
    // Автозапуск видео при открытии
    if (activeId) {
        setTimeout(() => {
            const v = document.getElementById(`v-${id}`);
            if (v) v.play();
        }, 100);
    }
}

render();
</script>
</body>
</html>
